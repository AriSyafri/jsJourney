<!DOCTYPE html>
<html lang="id">
    <head>
        <title>Latihan DOM Sekul</title>
        <style>
            .hadir {color: green; font-weight: bold;}
            .alpa {color: red; font-style: italic;}
        </style>
    </head>
    <body>
        <h2>Daftar Absensi Siswa</h2>
        <input type="text" id="inputNama" placeholder="Masukkan nama :">
        <button id="btnTambah">Tambah ke daftar</button>

        <ul id="daftarSiswa">
            <li>Mamat</li>
        </ul>

        <script>

            let dataSiswa = [
                {
                    id: 1, 
                    nama: "Ari"
                }
            ];

            const tombol = document.getElementById('btnTambah');
            const list = document.getElementById('daftarSiswa');
            const input = document.getElementById('inputNama'); 

            function renderDaftar(){
                list.innerHTML = "";

                list.innerHTML = dataSiswa.map((siswa) => `
                    <li class="hadir">
                        ${siswa.nama}
                        <button onclick="hapusSiswa(${siswa.id})">Hapus</button>
                    </li>
                `).join("");
            }

            tombol.addEventListener('click', () => {
                const namaBaru = input.value.trim();

                if(namaBaru !== "") {
                    const objekSiswa = {
                        id: Date.now(),
                        nama: namaBaru
                    };
                    dataSiswa = [...dataSiswa, objekSiswa];

                    renderDaftar();
                    input.value = "";
                } else {
                    alert("nama tidak boleh kosong");   
                }
            });

            function hapusSiswa(idHapus) {
                dataSiswa = dataSiswa.filter(siswa => siswa.id !== idHapus);
                renderDaftar();
            }

            renderDaftar();


        </script>
    </body>
</html>
